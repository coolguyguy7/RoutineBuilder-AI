kind = "web"
previewPath = "/"
title = "Routine Builder AI"
version = "1.0.0"
id = "artifacts/routine-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22049

[services.development]
run = "pnpm --filter @workspace/routine-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/routine-builder", "run", "build" ]
publicDir = "artifacts/routine-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22049"
BASE_PATH = "/"
